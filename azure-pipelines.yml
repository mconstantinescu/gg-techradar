# ══════════════════════════════════════════════════════════
# Azure DevOps Pipeline — Gunvor Technology Portal
# Deploys to Azure Static Web Apps via deployment token
# ══════════════════════════════════════════════════════════
#
# Repository layout (ADO Project: Technology):
#   - tech       : Next.js app, pipeline, configs, templates, scripts
#   - Radar      : Markdown content for the Technology Radar section
#   - Decisions  : Markdown content for the Technology Decisions section
#   - Documents  : Markdown content for the Technical Documentation section
#
# Required pipeline variables (set in ADO UI, NOT in this file):
#   - DEPLOYMENT_TOKEN  : SWA deployment token (secret)
#
# Branch strategy (GitOps):
#   - main          → production deployment
#   - feature/*     → preview environment (auto-cleaned on merge)
#   - pull requests → CI only (no deploy)

trigger:
  batch: true          # coalesce rapid pushes into a single run
  branches:
    include:
      - main
      - feature/*

pr:
  branches:
    include:
      - main

resources:
  repositories:
    - repository: Radar
      type: git
      name: Technology/Radar
      ref: main
      trigger:
        branches:
          include:
            - main
    - repository: Decisions
      type: git
      name: Technology/Decisions
      ref: main
      trigger:
        branches:
          include:
            - main
    - repository: Documents
      type: git
      name: Technology/Documents
      ref: main
      trigger:
        branches:
          include:
            - main

pool:
  vmImage: "ubuntu-latest"

variables:
  - group: techradar-secrets
  - name: nodeVersion
    value: "22.x"
  - name: buildDir
    value: "build"

stages:
  # ── Stage 1: CI ────────────────────────────────────
  - stage: CI
    displayName: "Build & Validate"
    jobs:
      - job: Build
        displayName: "Build Static Site"
        steps:
          - checkout: self
            fetchDepth: 1
            path: tech

          - checkout: Radar
            fetchDepth: 1
            path: Radar

          - checkout: Decisions
            fetchDepth: 1
            path: Decisions

          - checkout: Documents
            fetchDepth: 1
            path: Documents

          - task: UseNode@1
            displayName: "Use Node.js $(nodeVersion)"
            inputs:
              version: $(nodeVersion)

          - script: |
              echo "Assembling content from multi-repo checkout…"
              WORK="$(Pipeline.Workspace)/tech"
              mkdir -p "$WORK/radar" "$WORK/tdr" "$WORK/docs"
              cp -r "$(Pipeline.Workspace)/Radar"/* "$WORK/radar/" 2>/dev/null || true
              cp -r "$(Pipeline.Workspace)/Decisions"/* "$WORK/tdr/" 2>/dev/null || true
              cp -r "$(Pipeline.Workspace)/Documents"/* "$WORK/docs/" 2>/dev/null || true
              find "$WORK/radar" -name '*.md' | wc -l | xargs -I{} echo "Radar entries:    {}"
              find "$WORK/tdr" -name '*.md' | wc -l | xargs -I{} echo "Decisions entries: {}"
              find "$WORK/docs" -name '*.md' 2>/dev/null | wc -l | xargs -I{} echo "Documents entries: {}"
            displayName: "Assemble content from repos"

          - task: Cache@2
            displayName: "Cache npm dependencies"
            inputs:
              key: 'npm | "$(Agent.OS)" | $(Pipeline.Workspace)/tech/package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(Pipeline.Workspace)/.npm

          - script: npm ci --cache $(Pipeline.Workspace)/.npm
            displayName: "Install dependencies"
            workingDirectory: $(Pipeline.Workspace)/tech

          - script: npm run build
            displayName: "Build static site"
            workingDirectory: $(Pipeline.Workspace)/tech

          - script: |
              echo "Build output:"
              ls -la $(buildDir)/
              echo "File count: $(find $(buildDir) -type f | wc -l)"
              echo "Total size: $(du -sh $(buildDir) | cut -f1)"
            displayName: "Verify build output"
            workingDirectory: $(Pipeline.Workspace)/tech

          - publish: $(Pipeline.Workspace)/tech/$(buildDir)
            artifact: staticSite
            displayName: "Publish build artifact"
            condition: and(succeeded(), eq(variables['System.JobAttempt'], 1))

  # ── Stage 2: Deploy to SWA ────────────────────────
  - stage: Deploy
    displayName: "Deploy to Azure Static Web Apps"
    dependsOn: CI
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - deployment: DeploySWA
        displayName: "Deploy Static Web App"
        environment: "techradar-production"
        strategy:
          runOnce:
            deploy:
              steps:
                - download: none

                - task: DownloadPipelineArtifact@2
                  displayName: "Download build artifact"
                  inputs:
                    buildType: current
                    artifactName: staticSite
                    targetPath: $(System.DefaultWorkingDirectory)/staticSite

                - script: |
                    echo "Artifact contents:"
                    ls -la $(System.DefaultWorkingDirectory)/staticSite/ | head -20
                    echo "File count: $(find $(System.DefaultWorkingDirectory)/staticSite -type f | wc -l)"
                  displayName: "Verify downloaded artifact"

                - task: AzureStaticWebApp@0
                  displayName: "Deploy to SWA"
                  inputs:
                    skip_app_build: true
                    skip_api_build: true
                    app_location: "staticSite"
                    output_location: ""
                    azure_static_web_apps_api_token: $(DEPLOYMENT_TOKEN)
                    production_branch: "main"
                    cwd: $(System.DefaultWorkingDirectory)
