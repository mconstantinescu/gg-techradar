# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: gg-techradar
metadata:
  template: gg-techradar@10.0.0

# ── Infrastructure ──────────────────────────────────
infra:
  provider: terraform
  path: ./infra

# ── Services ────────────────────────────────────────
services:
  web:
    project: .
    host: staticwebapp
    language: js
    dist: build
    hooks:
      prepackage:
        shell: sh
        run: ./scripts/azd-prepackage.sh
